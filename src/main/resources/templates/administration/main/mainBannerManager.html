<!doctype html>
<html lang="ko" data-layout="vertical" data-topbar="light" data-sidebar="dark" data-sidebar-size="lg"
	data-sidebar-image="none" data-preloader="disable" xmlns:th="http://www.thymeleaf.org"
	xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="fragments/administration/common :: adminHead"></head>

<body>
	<div id="layout-wrapper">
		<header id="page-topbar" th:replace="fragments/administration/common :: adminHeader"></header>
		<div class="app-menu navbar-menu" th:replace="fragments/administration/common :: adminNav"></div>
		<div class="vertical-overlay"></div>

		<div class="main-content">
			<div class="page-content">
				<div class="container-fluid main-banner-manager-page">
					<div class="row">
						<div class="col-12">
							<div class="main-banner-manager-page-title-wrap">
								<h3 class="main-banner-manager-page-title">메인배너 관리</h3>
								<p class="main-banner-manager-page-desc">
									상단 슬라이드 배너를 등록, 수정, 삭제하고 드래그로 노출 순서를 변경합니다.
								</p>
							</div>
						</div>
					</div>

					<div class="row g-4">
						<div class="col-12">
							<div class="card main-banner-manager-form-card">
								<div class="card-header">
									<h5 class="card-title mb-0">메인배너 등록</h5>
								</div>
								<div class="card-body">
									<form id="main-banner-manager-create-form" enctype="multipart/form-data">
										<div class="row g-4 align-items-stretch">
											<div class="col-lg-6">
												<div class="main-banner-manager-upload-box">
													<div class="mb-3">
														<label class="form-label">PC용 이미지 <span
																class="text-danger">*</span></label>
														<input type="file" class="form-control" name="pcImage"
															accept="image/*" required>
													</div>

													<div>
														<label class="form-label">모바일용 이미지</label>
														<input type="file" class="form-control" name="mobileImage"
															accept="image/*">
														<div class="main-banner-manager-help">
															모바일 이미지가 없으면 PC 이미지를 그대로 사용합니다.
														</div>
													</div>
												</div>
											</div>

											<div class="col-lg-6">
												<div class="main-banner-manager-content-box">
													<div class="row g-3">
														<div class="col-6">
															<label class="form-label">일반 문구</label>
															<input type="text" class="form-control" name="generalText"
																placeholder="예: TITLE MESSAGE AREA,">
														</div>

														<div class="col-md-6">
															<label class="form-label">강조 문구 (strong)</label>
															<input type="text" class="form-control" name="strongText"
																placeholder="예: STRONG TEXT">
														</div>

														<div class="col-md-6">
															<label class="form-label">노출 순서</label>
															<input type="number" class="form-control"
																name="displayOrder" min="1" placeholder="비우면 마지막">
														</div>
														<div class="col-lg-6">
															<div class="main-banner-manager-action-box">
																<label class="form-label invisible-label">등록</label>
																<div class="main-banner-manager-action-bottom">
																	<button type="submit"
																		class="btn btn-primary w-100 main-banner-manager-submit-btn">
																		메인배너 등록
																	</button>
																</div>
															</div>
														</div>
													</div>
												</div>
											</div>


										</div>
									</form>
								</div>
							</div>
						</div>

						<div class="col-12">
							<div class="card main-banner-manager-list-card">
								<div
									class="card-header d-flex justify-content-between align-items-center flex-wrap gap-2">
									<div>
										<h5 class="card-title mb-1">등록된 메인배너</h5>
										<p class="main-banner-manager-list-desc mb-0">
											드래그 앤 드랍으로 순서를 바꾸면 바로 index 가 반영됩니다.
										</p>
									</div>
									<div class="badge bg-light text-dark fs-12" id="main-banner-manager-total-count">0개
									</div>
								</div>
								<div class="card-body">
									<div id="main-banner-manager-empty"
										class="main-banner-manager-empty d-none text-center"
										style="margin-bottom:10px;">
										등록된 메인배너가 없습니다.
									</div>
									<div class="row g-3" id="main-banner-manager-card-list"></div>
								</div>
							</div>
						</div>
					</div>
				</div>
			</div>

			<th:block th:replace="fragments/administration/common :: adminFooter"></th:block>
		</div>
	</div>

	<th:block th:replace="fragments/administration/common :: adminBottom"></th:block>
	<th:block th:replace="fragments/administration/common :: adminScript"></th:block>

	<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
	<script src="/administration/assets/js/page/mainBannerManager.js"></script>
</body>

</html>
