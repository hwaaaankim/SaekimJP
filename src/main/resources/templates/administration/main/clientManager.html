<!doctype html>
<html lang="ko" data-layout="vertical" data-topbar="light" data-sidebar="dark" data-sidebar-size="lg"
	data-sidebar-image="none" data-preloader="disable" xmlns:th="http://www.thymeleaf.org"
	xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="fragments/administration/common :: adminHead"></head>

<body>
	<div id="layout-wrapper">
		<header id="page-topbar" th:replace="fragments/administration/common :: adminHeader"></header>
		<div class="app-menu navbar-menu" th:replace="fragments/administration/common :: adminNav"></div>
		<div class="vertical-overlay"></div>

		<div class="main-content">
			<div class="page-content">
				<div class="container-fluid client-manager-page" id="client-manager-page"
					data-api-url="/admin/api/contactInquiries">

					<div class="row mb-4">
						<div class="col-12">
							<div class="client-manager-page-title-wrap">
								<h3 class="client-manager-page-title mb-1">고객문의관리</h3>
								<p class="text-muted mb-0">고객 문의 목록 조회, 확인, 수정, 삭제가 가능합니다.</p>
							</div>
						</div>
					</div>

					<style>
						.client-manager-page .client-manager-filter-card,
						.client-manager-page .client-manager-list-card {
							border: 0;
							border-radius: 16px;
							box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
						}

						.client-manager-page .form-control,
						.client-manager-page .form-select {
							min-height: 44px;
						}

						.client-manager-page .client-manager-table th,
						.client-manager-page .client-manager-table td {
							vertical-align: middle;
							text-align: center;
							height: 60px;
						}

						.client-manager-page .client-manager-name-button {
							font-weight: 600;
							text-decoration: none;
						}

						.client-manager-page .client-manager-summary {
							display: flex;
							align-items: center;
							justify-content: space-between;
							gap: 12px;
							flex-wrap: wrap;
						}

						.client-manager-page .client-manager-modal-label {
							font-weight: 600;
							margin-bottom: 6px;
						}

						.client-manager-page .client-manager-badge {
							min-width: 70px;
							display: inline-flex;
							align-items: center;
							justify-content: center;
						}

						.client-manager-page #client-manager-detail-modal .modal-content {
							overflow: hidden;
						}

						.client-manager-page #client-manager-detail-modal .modal-body.client-manager-detail-modal-body {
							padding-bottom: 2rem;
							overflow-x: hidden;
						}

						.client-manager-page .client-manager-radio-col {
							display: flex;
							flex-direction: column;
						}

						.client-manager-page .client-manager-radio-box {
							min-height: 46px;
							height: 46px;
							display: flex;
							align-items: center;
							justify-content: center;
							gap: 1.5rem;
							padding: 0 1rem;
							border: 1px solid var(--bs-border-color);
							border-radius: 0.75rem;
							background-color: #fff;
							flex-wrap: nowrap;
						}

						.client-manager-page .client-manager-radio-box .form-check {
							height: 100%;
							display: flex;
							align-items: center;
							margin-bottom: 0 !important;
						}

						.client-manager-page .client-manager-radio-box .form-check-input {
							margin-top: 0;
							flex-shrink: 0;
						}

						.client-manager-page .client-manager-radio-box .form-check-label {
							height: 100%;
							display: flex;
							align-items: center;
							margin-left: 0.4rem;
							white-space: nowrap;
						}

						.client-manager-page .client-manager-radio-box-confirmed {
							margin-bottom: 2px;
						}
					</style>

					<div class="row g-4">
						<div class="col-12">
							<div class="card client-manager-filter-card">
								<div class="card-body">
									<form id="client-manager-search-form">
										<div class="row g-3 align-items-end">
											<div class="col-12 col-lg-2">
												<label for="client-manager-page-size" class="form-label">페이지 사이즈</label>
												<select class="form-select" id="client-manager-page-size" name="size">
													<option value="10" selected>10</option>
													<option value="30">30</option>
													<option value="50">50</option>
													<option value="100">100</option>
												</select>
											</div>

											<div class="col-12 col-lg-2">
												<label for="client-manager-search-type" class="form-label">검색조건</label>
												<select class="form-select" id="client-manager-search-type"
													name="searchType">
													<option value="name" selected>고객명</option>
													<option value="phone">연락처</option>
													<option value="email">이메일</option>
												</select>
											</div>

											<div class="col-12 col-lg-6">
												<label for="client-manager-keyword" class="form-label">키워드</label>
												<input type="text" class="form-control" id="client-manager-keyword"
													name="keyword" placeholder="검색어를 입력해 주세요.">
											</div>

											<div class="col-12 col-lg-2 d-grid">
												<button type="submit" class="btn btn-primary" style="height:44px;">
													검색
												</button>
											</div>
										</div>
									</form>
								</div>
							</div>
						</div>

						<div class="col-12">
							<div class="card client-manager-list-card">
								<div class="card-body">
									<div class="client-manager-summary mb-3">
										<h5 class="mb-0">고객문의 리스트</h5>
										<div class="text-muted">
											총 <span id="client-manager-total-count">0</span>건
										</div>
									</div>

									<div class="table-responsive">
										<table class="table table-hover align-middle mb-0 client-manager-table">
											<thead class="table-light">
												<tr>
													<th>번호</th>
													<th>이름</th>
													<th>연락처</th>
													<th>문의시간</th>
													<th>수정시간</th>
													<th>확인여부</th>
												</tr>
											</thead>
											<tbody id="client-manager-table-body">
												<tr>
													<td colspan="6" class="text-center text-muted py-5">
														데이터를 불러오는 중입니다.
													</td>
												</tr>
											</tbody>
										</table>
									</div>

									<nav class="mt-4">
										<ul class="pagination justify-content-center mb-0"
											id="client-manager-pagination"></ul>
									</nav>
								</div>
							</div>
						</div>
					</div>

					<div class="modal fade" id="client-manager-detail-modal" tabindex="-1" aria-hidden="true">
						<div class="modal-dialog modal-xl modal-dialog-centered modal-dialog-scrollable">
							<div class="modal-content">
								<div class="modal-header">
									<h5 class="modal-title">고객문의 상세</h5>
									<button type="button" class="btn-close" data-bs-dismiss="modal"
										aria-label="닫기"></button>
								</div>

								<div class="modal-body client-manager-detail-modal-body">
									<form id="client-manager-detail-form">
										<input type="hidden" id="client-manager-detail-id">

										<div class="row g-3">
											<div class="col-12 col-lg-4">
												<label class="client-manager-modal-label"
													for="client-manager-detail-name">이름</label>
												<input type="text" class="form-control" id="client-manager-detail-name">
											</div>

											<div class="col-12 col-lg-4">
												<label class="client-manager-modal-label"
													for="client-manager-detail-phone">연락처</label>
												<input type="text" class="form-control"
													id="client-manager-detail-phone">
											</div>

											<div class="col-12 col-lg-4">
												<label class="client-manager-modal-label"
													for="client-manager-detail-email">이메일</label>
												<input type="text" class="form-control"
													id="client-manager-detail-email">
											</div>

											<div class="col-12 col-lg-3">
												<label class="client-manager-modal-label"
													for="client-manager-detail-preferred-date">상담 희망일자</label>
												<input type="text" class="form-control"
													id="client-manager-detail-preferred-date"
													placeholder="예: 2026-04-15">
											</div>

											<div class="col-12 col-lg-3">
												<label class="client-manager-modal-label"
													for="client-manager-detail-preferred-time">상담 희망시간</label>
												<input type="text" class="form-control"
													id="client-manager-detail-preferred-time" placeholder="예: 14:00">
											</div>

											<div class="col-12 col-lg-3 client-manager-radio-col">
												<label class="client-manager-modal-label d-block">수술 경험</label>
												<div class="client-manager-radio-box">
													<div class="form-check mb-0">
														<input class="form-check-input" type="radio"
															name="client-manager-detail-surgery-experience"
															id="client-manager-detail-surgery-experience-true"
															value="true">
														<label class="form-check-label"
															for="client-manager-detail-surgery-experience-true">있음</label>
													</div>
													<div class="form-check mb-0">
														<input class="form-check-input" type="radio"
															name="client-manager-detail-surgery-experience"
															id="client-manager-detail-surgery-experience-false"
															value="false">
														<label class="form-check-label"
															for="client-manager-detail-surgery-experience-false">없음</label>
													</div>
												</div>
											</div>

											<div class="col-12 col-lg-3 client-manager-radio-col">
												<label class="client-manager-modal-label d-block">재수술 여부</label>
												<div class="client-manager-radio-box">
													<div class="form-check mb-0">
														<input class="form-check-input" type="radio"
															name="client-manager-detail-revision-surgery"
															id="client-manager-detail-revision-surgery-true"
															value="true">
														<label class="form-check-label"
															for="client-manager-detail-revision-surgery-true">예</label>
													</div>
													<div class="form-check mb-0">
														<input class="form-check-input" type="radio"
															name="client-manager-detail-revision-surgery"
															id="client-manager-detail-revision-surgery-false"
															value="false">
														<label class="form-check-label"
															for="client-manager-detail-revision-surgery-false">아니오</label>
													</div>
												</div>
											</div>

											<div class="col-12 col-lg-6">
												<label class="client-manager-modal-label"
													for="client-manager-detail-inquiry-at">문의시간</label>
												<input type="text" class="form-control"
													id="client-manager-detail-inquiry-at" readonly>
											</div>

											<div class="col-12 col-lg-6">
												<label class="client-manager-modal-label"
													for="client-manager-detail-updated-at">최근수정시간</label>
												<input type="text" class="form-control"
													id="client-manager-detail-updated-at" readonly>
											</div>

											<div class="col-12">
												<label class="client-manager-modal-label"
													for="client-manager-detail-customer-memo">기타남김말</label>
												<textarea class="form-control" id="client-manager-detail-customer-memo"
													rows="4"></textarea>
											</div>

											<div class="col-12">
												<label class="client-manager-modal-label"
													for="client-manager-detail-admin-memo">관리자남김말</label>
												<textarea class="form-control" id="client-manager-detail-admin-memo"
													rows="4" placeholder="관리자 메모를 입력해 주세요."></textarea>
											</div>

											<div class="col-12 col-lg-3 client-manager-radio-col">
												<label class="client-manager-modal-label d-block">확인여부</label>
												<div
													class="client-manager-radio-box client-manager-radio-box-confirmed">
													<div class="form-check mb-0">
														<input class="form-check-input" type="radio"
															name="client-manager-detail-confirmed"
															id="client-manager-detail-confirmed-true" value="true">
														<label class="form-check-label"
															for="client-manager-detail-confirmed-true">확인</label>
													</div>
													<div class="form-check mb-0">
														<input class="form-check-input" type="radio"
															name="client-manager-detail-confirmed"
															id="client-manager-detail-confirmed-false" value="false">
														<label class="form-check-label"
															for="client-manager-detail-confirmed-false">미확인</label>
													</div>
												</div>
											</div>
										</div>
									</form>
								</div>

								<div class="modal-footer">
									<button type="button" class="btn btn-danger"
										id="client-manager-delete-btn">삭제</button>
									<button type="button" class="btn btn-primary" id="client-manager-save-btn">수정
										저장</button>
								</div>
							</div>
						</div>
					</div>

				</div>
			</div>

			<th:block th:replace="fragments/administration/common :: adminFooter"></th:block>
		</div>
	</div>

	<th:block th:replace="fragments/administration/common :: adminBottom"></th:block>
	<th:block th:replace="fragments/administration/common :: adminScript"></th:block>

	<script src="/administration/assets/js/page/clientManager.js"></script>
</body>

</html>
