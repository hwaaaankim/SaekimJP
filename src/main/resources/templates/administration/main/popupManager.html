<!doctype html>
<html lang="ko" data-layout="vertical" data-topbar="light" data-sidebar="dark" data-sidebar-size="lg"
	data-sidebar-image="none" data-preloader="disable" xmlns:th="http://www.thymeleaf.org"
	xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="fragments/administration/common :: adminHead"></head>

<body>
	<div id="layout-wrapper">
		<header id="page-topbar" th:replace="fragments/administration/common :: adminHeader"></header>
		<div class="app-menu navbar-menu" th:replace="fragments/administration/common :: adminNav"></div>
		<div class="vertical-overlay"></div>

		<div class="main-content">
			<div class="page-content">
				<div class="container-fluid popup-manager-page">
					<div class="row">
						<div class="col-12">
							<div class="popup-manager-page-title-wrap">
								<h3 class="popup-manager-page-title">팝업 관리</h3>
								<p class="popup-manager-page-desc">
									하단 팝업 이미지를 등록, 수정, 삭제하고 드래그로 노출 순서를 변경합니다.
								</p>
							</div>
						</div>
					</div>

					<div class="row g-4">
						<div class="col-12">
							<div class="card popup-manager-form-card">
								<div class="card-header">
									<h5 class="card-title mb-0">팝업 등록</h5>
								</div>
								<div class="card-body">
									<form id="popup-manager-create-form" enctype="multipart/form-data">
										<div class="row g-4 align-items-stretch">
											<div class="col-lg-6">
												<div class="popup-manager-upload-box">
													<label class="form-label">팝업 이미지 <span
															class="text-danger">*</span></label>
													<input type="file" class="form-control" name="image"
														accept="image/*" required>

													<div class="popup-manager-help">
														현재 고객용 팝업과 동일한 샘플 비율(450×700 기준)에 맞는 이미지를 사용하시면 가장 자연스럽습니다.
													</div>
												</div>
											</div>

											<div class="col-lg-6">
												<div class="popup-manager-content-box">
													<div class="row g-3">
														<div class="col-12">
															<label class="form-label">링크</label>
															<input type="text" class="form-control" name="linkUrl"
																placeholder="예: /event 또는 https://...">
														</div>

													</div>
												</div>
											</div>
											<div class="col-lg-12">
												<div class="popup-manager-content-box">
													<div class="row g-3">

														<div class="col-md-3">
															<label class="form-label">노출 순서</label>
															<input type="number" class="form-control"
																name="displayOrder" min="1" placeholder="비우면 마지막">
														</div>

														<div class="col-md-3">
															<div class="popup-manager-switch-box">
																<label class="form-label"
																	for="popup-manager-use-period">노출 날짜 지정</label>
																<div
																	class="form-check form-switch popup-manager-switch-wrap">
																	<input class="form-check-input" type="checkbox"
																		id="popup-manager-use-period"
																		name="useDisplayPeriod">
																</div>
															</div>
														</div>

														<div class="col-md-2">
															<label class="form-label">시작일</label>
															<input type="date"
																class="form-control popup-manager-create-period-field"
																name="displayStartDate" disabled>
														</div>

														<div class="col-md-2">
															<label class="form-label">종료일</label>
															<input type="date"
																class="form-control popup-manager-create-period-field"
																name="displayEndDate" disabled>
														</div>
														<div class="col-lg-2">
															<div class="popup-manager-action-box">
																<label class="form-label invisible-label">등록</label>
																<div class="popup-manager-action-bottom">
																	<button type="submit"
																		class="btn btn-primary w-100 popup-manager-submit-btn">
																		팝업 등록
																	</button>
																</div>
															</div>
														</div>
													</div>
												</div>
											</div>


										</div>
									</form>
								</div>
							</div>
						</div>

						<div class="col-12">
							<div class="card popup-manager-list-card">
								<div
									class="card-header d-flex justify-content-between align-items-center flex-wrap gap-2">
									<div>
										<h5 class="card-title mb-1">등록된 팝업</h5>
										<p class="popup-manager-list-desc mb-0">
											날짜 지정이 없는 경우 항상 노출되며, 링크가 없으면 고객용 버튼은 비활성화됩니다.
										</p>
									</div>
									<div class="badge bg-light text-dark fs-12" id="popup-manager-total-count">0개</div>
								</div>
								<div class="card-body">
									<div id="popup-manager-empty" class="popup-manager-empty d-none text-center" style="margin-bottom:10px;">
										등록된 팝업이 없습니다.
									</div>
									<div class="row g-3" id="popup-manager-card-list"></div>
								</div>
							</div>
						</div>
					</div>
				</div>
			</div>

			<th:block th:replace="fragments/administration/common :: adminFooter"></th:block>
		</div>
	</div>

	<th:block th:replace="fragments/administration/common :: adminBottom"></th:block>
	<th:block th:replace="fragments/administration/common :: adminScript"></th:block>

	<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
	<script src="/administration/assets/js/page/popupManager.js"></script>
</body>

</html>
