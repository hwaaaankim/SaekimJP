<!doctype html>
<html lang="ko"
      data-layout="vertical"
      data-topbar="light"
      data-sidebar="dark"
      data-sidebar-size="lg"
      data-sidebar-image="none"
      data-preloader="disable"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="fragments/administration/common :: adminHead"></head>

<body>
<div id="layout-wrapper">
    <header id="page-topbar" th:replace="fragments/administration/common :: adminHeader"></header>
    <div class="app-menu navbar-menu" th:replace="fragments/administration/common :: adminNav"></div>
    <div class="vertical-overlay"></div>

    <div class="main-content">
        <div class="page-content">
            <div class="container-fluid notice-manager-page">
                <div class="row">
                    <div class="col-12">
                        <div class="notice-manager-page-title-wrap">
                            <h3 class="notice-manager-page-title">공지사항관리</h3>
                            <p class="notice-manager-page-desc">공지사항 등록, 수정, 삭제 및 순서 관리를 진행합니다.</p>
                        </div>
                    </div>
                </div>

                <div class="row g-4">
                    <div class="col-12">
                        <div class="card notice-manager-create-card">
                            <div class="card-header">
                                <h5 class="card-title mb-0">공지사항 등록</h5>
                            </div>
                            <div class="card-body">
                                <form id="notice-manager-create-form" class="notice-manager-create-form">
                                    <div class="row g-3">
                                        <div class="col-12">
                                            <label for="notice-manager-create-title" class="form-label notice-manager-label">제목</label>
                                            <input type="text"
                                                   id="notice-manager-create-title"
                                                   class="form-control notice-manager-input"
                                                   placeholder="공지사항 제목을 입력해주세요.">
                                        </div>

                                        <div class="col-12">
                                            <label for="notice-manager-create-content" class="form-label notice-manager-label">내용</label>
                                            <textarea id="notice-manager-create-content"
                                                      class="notice-manager-editor-textarea"></textarea>
                                        </div>

                                        <div class="col-12 d-flex justify-content-end">
                                            <button type="submit" class="btn btn-primary notice-manager-submit-btn">
                                                등록
                                            </button>
                                        </div>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>

                    <div class="col-12">
                        <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
                            <div>
                                <h5 class="mb-1">등록된 공지사항</h5>
                                <p class="text-muted mb-0">제목 클릭 시 수정 모달이 열리며, 왼쪽 햄버거 버튼으로 순서를 변경할 수 있습니다.</p>
                            </div>
                            <button type="button"
                                    id="notice-manager-save-order-btn"
                                    class="btn btn-success"
                                    disabled>
                                순서저장
                            </button>
                        </div>

                        <div class="row g-3 notice-manager-sortable" id="notice-manager-sortable">
                            <div class="col-lg-4 col-md-6 notice-manager-sort-item"
                                 th:each="notice : ${noticeList}"
                                 th:attr="data-notice-id=${notice.id}">
                                <div class="card notice-manager-list-card h-100">
                                    <div class="card-body notice-manager-list-card-body">
                                        <div class="notice-manager-card-top">
                                            <button type="button"
                                                    class="btn btn-light btn-sm notice-manager-drag-handle"
                                                    title="순서 변경">
                                                <i class="ri-menu-line"></i>
                                            </button>

                                            <div class="notice-manager-index-badge">
                                                INDEX <span th:text="${notice.displayIndex}">1</span>
                                            </div>
                                        </div>

                                        <div class="notice-manager-card-content">
                                            <button type="button"
                                                    class="notice-manager-title-btn"
                                                    th:attr="data-notice-id=${notice.id}"
                                                    th:text="${notice.title}">
                                                제목
                                            </button>

                                            <div class="notice-manager-meta">
                                                <div class="notice-manager-meta-item">
                                                    <span class="notice-manager-meta-label">ID</span>
                                                    <span class="notice-manager-meta-value" th:text="${notice.id}">1</span>
                                                </div>
                                                <div class="notice-manager-meta-item">
                                                    <span class="notice-manager-meta-label">조회수</span>
                                                    <span class="notice-manager-meta-value" th:text="${notice.viewCount}">0</span>
                                                </div>
                                                <div class="notice-manager-meta-item">
                                                    <span class="notice-manager-meta-label">등록일</span>
                                                    <span class="notice-manager-meta-value"
                                                          th:text="${#temporals.format(notice.createdAt, 'yyyy-MM-dd HH:mm')}">2026-04-15 10:00</span>
                                                </div>
                                                <div class="notice-manager-meta-item">
                                                    <span class="notice-manager-meta-label">수정일</span>
                                                    <span class="notice-manager-meta-value"
                                                          th:text="${#temporals.format(notice.updatedAt, 'yyyy-MM-dd HH:mm')}">2026-04-15 10:00</span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="col-12" th:if="${#lists.isEmpty(noticeList)}">
                                <div class="card">
                                    <div class="card-body text-center text-muted py-5">
                                        등록된 공지사항이 없습니다.
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <th:block th:replace="fragments/administration/common :: adminFooter"></th:block>
    </div>
</div>

<div class="modal fade" id="notice-manager-edit-modal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-xl modal-dialog-centered modal-dialog-scrollable">
        <div class="modal-content notice-manager-modal-content">
            <div class="modal-header">
                <h5 class="modal-title">공지사항 수정</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="닫기"></button>
            </div>

            <div class="modal-body">
                <input type="hidden" id="notice-manager-edit-id">

                <div class="row g-3">
                    <div class="col-12">
                        <label for="notice-manager-edit-title" class="form-label notice-manager-label">제목</label>
                        <input type="text" id="notice-manager-edit-title" class="form-control notice-manager-input">
                    </div>

                    <div class="col-12">
                        <label for="notice-manager-edit-content" class="form-label notice-manager-label">내용</label>
                        <textarea id="notice-manager-edit-content" class="notice-manager-editor-textarea"></textarea>
                    </div>

                    <div class="col-12">
                        <div class="notice-manager-modal-meta">
                            <span>ID : <strong id="notice-manager-edit-id-text">-</strong></span>
                            <span>INDEX : <strong id="notice-manager-edit-index-text">-</strong></span>
                            <span>조회수 : <strong id="notice-manager-edit-view-count-text">0</strong></span>
                            <span>등록일 : <strong id="notice-manager-edit-created-at-text">-</strong></span>
                            <span>수정일 : <strong id="notice-manager-edit-updated-at-text">-</strong></span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="modal-footer notice-manager-modal-footer">
                <button type="button" id="notice-manager-delete-btn" class="btn btn-danger">
                    삭제
                </button>
                <button type="button" id="notice-manager-update-btn" class="btn btn-primary" disabled>
                    수정
                </button>
            </div>
        </div>
    </div>
</div>

<th:block th:replace="fragments/administration/common :: adminBottom"></th:block>
<th:block th:replace="fragments/administration/common :: adminScript"></th:block>

<script src="https://cdn.ckeditor.com/ckeditor5/39.0.1/classic/ckeditor.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<script src="/administration/assets/js/page/noticeManager.js"></script>
</body>
</html>
