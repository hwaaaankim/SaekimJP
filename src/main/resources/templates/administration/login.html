<!doctype html>
<html 
lang="en" 
data-layout="vertical" 
data-topbar="light" 
data-sidebar="dark" 
data-sidebar-size="lg"
data-sidebar-image="none" 
data-preloader="disable" 
xmlns:th="http://www.thymeleaf.org"
xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="fragments/administration/common :: adminHead"></head>

<body>

    <div class="auth-page-wrapper pt-5">
        <div class="auth-one-bg-position auth-one-bg" id="auth-particles">
            <div class="bg-overlay"></div>

            <div class="shape">
                <svg xmlns="http://www.w3.org/2000/svg" version="1.1" xmlns:xlink="http://www.w3.org/1999/xlink"
                    viewBox="0 0 1440 120">
                    <path d="M 0,36 C 144,53.6 432,123.2 720,124 C 1008,124.8 1296,56.8 1440,40L1440 140L0 140z"></path>
                </svg>
            </div>
        </div>

        <div class="auth-page-content">
            <div class="container">
                <div class="row">
                    <div class="col-lg-12">
                        <div class="text-center mt-sm-5 mb-4 text-white-50">
                            <div>
                                <a th:href="@{/index}" class="d-inline-block auth-logo">
                                    <img src="/administration/assets/images/logo-light.png" alt="" height="20">
                                </a>
                            </div>
                            <p class="mt-3 fs-15 fw-medium">새김</p>
                        </div>
                    </div>
                </div>

                <div class="row justify-content-center">
                    <div class="col-md-8 col-lg-6 col-xl-5">
                        <div class="card mt-4">

                            <div class="card-body p-4">
                                <div class="text-center mt-2">
                                    <h5 class="text-primary">Welcome!</h5>
                                    <p class="text-muted">관리자 로그인을 진행해주세요.</p>
                                </div>

                                <div class="p-2 mt-4">

                                    <!-- 로그인 실패 메시지 -->
                                    <div th:if="${param.error}" class="alert alert-danger alert-border-left alert-dismissible fade show mb-3" role="alert">
                                        아이디 또는 비밀번호가 올바르지 않습니다.
                                    </div>

                                    <!-- 로그아웃 메시지 -->
                                    <div th:if="${param.logout}" class="alert alert-success alert-border-left alert-dismissible fade show mb-3" role="alert">
                                        정상적으로 로그아웃되었습니다.
                                    </div>

                                    <form th:action="@{/signinProcess}" method="post">

                                        <div class="mb-3">
                                            <label for="username" class="form-label">Username</label>
                                            <input type="text"
                                                   class="form-control"
                                                   id="username"
                                                   name="username"
                                                   placeholder="Enter username"
                                                   autocomplete="username"
                                                   required>
                                        </div>

                                        <div class="mb-3">
                                            <label class="form-label" for="password-input">Password</label>
                                            <div class="position-relative auth-pass-inputgroup mb-3">
                                                <input type="password"
                                                       class="form-control pe-5 password-input"
                                                       id="password-input"
                                                       name="password"
                                                       placeholder="Enter password"
                                                       autocomplete="current-password"
                                                       required>
                                                <button
                                                    class="btn btn-link position-absolute end-0 top-0 text-decoration-none text-muted password-addon"
                                                    type="button"
                                                    id="password-addon">
                                                    <i class="ri-eye-fill align-middle"></i>
                                                </button>
                                            </div>
                                        </div>

                                        <div class="mt-4">
                                            <button class="btn btn-success w-100" type="submit">로그인</button>
                                        </div>

                                    </form>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            </div>
        </div>

        <th:block th:replace="fragments/administration/common :: adminFooter"></th:block>
	</div>
	<th:block th:replace="fragments/administration/common :: adminBottom"></th:block>

	<th:block th:replace="fragments/administration/common :: adminScript"></th:block>
</body>

</html>
