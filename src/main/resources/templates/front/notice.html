<!doctype html>
<html id="hamHtml" lang="ko" xmlns:th="http://www.thymeleaf.org">

<head th:replace="fragments/front/common :: commonHead"></head>

<body id="hamBody" class="" data-aos-easing="ease" data-aos-duration="400" data-aos-delay="0">
	<div id="container">
		<th:block th:replace="~{fragments/front/common :: commonHeader(white=${false}, dark=${true})}"></th:block>

		<main id="main">
			<div class="main-wrap">
				<section class="bsc_container">
					<section class="subtit-wrap">
						<div class="inner w1280 mt-3">
							<p class="title">공지사항</p>
							<span class="sub-txt">잉글루의 새로운 소식을 확인해보세요.</span>
						</div>
					</section>

					<section class="default-wrap">
						<div class="inner w1280">
							<div class="total-searchBox">
								<div class="total">
									<p class="total-txt">
										Total <span class="total-num" th:text="${totalCount}">0</span>
									</p>
								</div>

								<form name="searchForm" id="searchForm" method="get" th:action="@{/notice}">
									<div class="search">
										<div class="inputBox">
											<input type="text" name="searchText" id="searchText" title="검색어"
												class="input-txt" placeholder="검색어를 입력해주세요." th:value="${searchText}">
											<button type="submit" value="검색" class="searchBtn"></button>
										</div>
									</div>
								</form>
							</div>

							<div class="notice-list__wrap">
								<ul class="notice-list" id="noticeList">
									<li class="notice-list__item" th:each="notice, iterStat : ${noticePage.content}"
										th:attr="data-id=${notice.id}">
										<p class="notice-num"
											th:text="${totalCount - (noticePage.number * noticePage.size) - iterStat.index}">
											1
										</p>
										<div class="notice-con">
											<a href="#" class="notice-title" th:attr="data-id=${notice.id}"
												th:text="${notice.title}">
												NOTICE TITLE AREA.
											</a>
											<time class="notice-date"
												th:datetime="${#temporals.format(notice.createdAt, 'yyyy-MM-dd')}"
												th:text="${#temporals.format(notice.createdAt, 'yyyy-MM-dd')}">
												2025-01-01
											</time>
										</div>
									</li>

									<li class="notice-list__item" th:if="${#lists.isEmpty(noticePage.content)}">
										<p class="notice-num">-</p>
										<div class="notice-con">
											<span class="notice-title">등록된 공지사항이 없습니다.</span>
											<time class="notice-date">-</time>
										</div>
									</li>
								</ul>
							</div>

							<ul class="list-pagination" th:if="${noticePage.totalPages > 0}">
								<span class="arrow">
									<a th:href="@{/notice(page=1, searchText=${searchText})}" class="first">
										<em class="blind">처음페이지</em>
									</a>

									<a th:href="@{/notice(page=${currentPage > 1 ? currentPage - 1 : 1}, searchText=${searchText})}"
										class="prev">
										<em class="blind">이전페이지</em>
									</a>
								</span>

								<ul class="num-list">
									<li th:each="pageNum : ${pageNumbers}"
										th:classappend="${pageNum == currentPage} ? 'current on' : ''">
										<a th:href="@{/notice(page=${pageNum}, searchText=${searchText})}"
											th:text="${pageNum}">1</a>
									</li>
								</ul>

								<span class="arrow">
									<a th:href="@{/notice(page=${currentPage < noticePage.totalPages ? currentPage + 1 : noticePage.totalPages}, searchText=${searchText})}"
										class="next">
										<em class="blind">다음페이지</em>
									</a>

									<a th:href="@{/notice(page=${noticePage.totalPages}, searchText=${searchText})}"
										class="last">
										<em class="blind">마지막페이지</em>
									</a>
								</span>
							</ul>
						</div>
					</section>
				</section>
			</div>
		</main>

		<footer th:replace="fragments/front/common :: commonFooter"></footer>
	</div>

	<th:block th:replace="fragments/front/common :: commonScript"></th:block>
	<script src="/front/resources/js/notice.js"></script>
</body>

</html>
