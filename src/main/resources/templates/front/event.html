			function eventAddedGetFilteredItems() {
				if (eventAddedCurrentFilter === 'all') {
					return eventAddedItems;
				}
				return eventAddedItems.filter(function (item) {
					return item.status === eventAddedCurrentFilter;
				});
			}

			function eventAddedCreateCard(item) {
				const col = document.createElement('div');
				col.className = 'col-12 col-md-6 col-lg-4 event-added-col';

				const isEnded = item.status === 'ended';
				const badgeClass = isEnded ? 'event-added-ended' : 'event-added-ongoing';
				const badgeText = isEnded ? '종료' : '진행중';

				col.innerHTML = `
					<article class="event-added-card event-added-observe">
						<div class="event-added-thumb-wrap ${isEnded ? 'event-added-ended' : ''}">
							<img src="${eventAddedImage}" alt="${item.title}">
							<span class="event-added-number">NO. ${String(item.no).padStart(2, '0')}</span>
							<span class="event-added-state-badge ${badgeClass}">${badgeText}</span>
							${isEnded ? '<span class="event-added-ended-label">EVENT END</span>' : ''}
						</div>

						<div class="event-added-card-body">
							<h3 class="event-added-title">${item.title}</h3>
							<p class="event-added-date">${item.date}</p>
							<p class="event-added-summary">${item.summary}</p>

							<div class="event-added-action">
								${item.buttonLink
						? `<a href="${item.buttonLink}" class="event-added-action-btn">${item.buttonText}</a>`
						: `<span class="event-added-action-empty">링크 없음</span>`
					}
							</div>
						</div>
					</article>
				`;

				return col;
			}

			function eventAddedBindReveal() {
				const targetCards = document.querySelectorAll('.event-added-observe');

				const observer = new IntersectionObserver(function (entries) {
					entries.forEach(function (entry) {
						if (entry.isIntersecting) {
							entry.target.classList.add('event-added-visible');
							observer.unobserve(entry.target);
						}
					});
				}, {
					threshold: 0.12
				});

				targetCards.forEach(function (card) {
					observer.observe(card);
				});
			}

			function eventAddedUpdateButton(filteredItems) {
				const remain = filteredItems.length - eventAddedVisibleCount;
				if (remain > 0) {
					eventAddedLoadMoreBtn.disabled = false;
					eventAddedLoadMoreBtn.textContent = '다음 이벤트 더 보기 (' + remain + '건 남음)';
				} else {
					eventAddedLoadMoreBtn.disabled = true;
					eventAddedLoadMoreBtn.textContent = '모든 이벤트를 확인하셨습니다';
				}
			}

			function eventAddedRender(reset) {
				const filteredItems = eventAddedGetFilteredItems();
				if (reset) {
					eventAddedVisibleCount = eventAddedPageSize;
					eventAddedGrid.innerHTML = '';
				}

				const visibleItems = filteredItems.slice(0, eventAddedVisibleCount);
				eventAddedGrid.innerHTML = '';

				visibleItems.forEach(function (item) {
					eventAddedGrid.appendChild(eventAddedCreateCard(item));
				});

				eventAddedCountEl.textContent = '총 ' + filteredItems.length + '건';
				eventAddedUpdateButton(filteredItems);
				eventAddedBindReveal();
			}

			function eventAddedLoadMore() {
				const filteredItems = eventAddedGetFilteredItems();
				if (eventAddedVisibleCount >= filteredItems.length) {
					eventAddedUpdateButton(filteredItems);
					return;
				}
				eventAddedVisibleCount += eventAddedAppendSize;
				eventAddedRender(false);
			}

			eventAddedStatusInputs.forEach(function (input) {
				input.addEventListener('change', function () {
					eventAddedCurrentFilter = this.value;
					eventAddedRender(true);
				});
			});

			eventAddedLoadMoreBtn.addEventListener('click', eventAddedLoadMore);

			let eventAddedScrollTicking = false;
			window.addEventListener('scroll', function () {
				if (eventAddedScrollTicking) return;
				eventAddedScrollTicking = true;

				window.requestAnimationFrame(function () {
					const rect = eventAddedSentinel.getBoundingClientRect();
					if (rect.top < window.innerHeight + 180) {
						eventAddedLoadMore();
					}
					eventAddedScrollTicking = false;
				});
			});

			eventAddedRender(true);
		});
	</script>
