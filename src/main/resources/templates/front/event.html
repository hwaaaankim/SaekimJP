<html id="hamHtml" lang="ko" xmlns:th="http://www.thymeleaf.org">

<head th:replace="fragments/front/common :: commonHead"></head>

<body id="hamBody" class="" data-aos-easing="ease" data-aos-duration="400" data-aos-delay="0">
	<div id="container">
		<th:block th:replace="~{fragments/front/common :: commonHeader(white=${false}, dark=${true})}"></th:block>

		<main id="main">
			<div class="main-wrap">
				<section class="bsc_container">
					<section class="subtit-wrap">
						<div class="inner w1280 mt-3">
							<p class="title">EVENT</p>
							<span class="sub-txt">새김성형외과의 EVENT 를 만나보세요</span><br>
						</div>
					</section>

					<section class="event-added-page-section">
						<div class="inner w1280" id="event-page-root" data-first-size="15" data-next-size="6">
							<div class="event-added-top-wrap">
								<div class="event-added-top-title-wrap">
									<p class="event-added-top-title">진행중 / 종료 이벤트</p>
									<p class="event-added-top-desc">현재 진행중인 이벤트와 종료된 이벤트를 구분하여 확인하실 수 있습니다.</p>
								</div>

								<div class="event-added-switch-row">
									<div class="event-added-switch-group" id="event-added-status-switch">
										<label class="event-added-switch-pill">
											<input type="radio" name="event-added-status" value="all" checked>
											<span>전체</span>
										</label>
										<label class="event-added-switch-pill">
											<input type="radio" name="event-added-status" value="ongoing">
											<span>진행중</span>
										</label>
										<label class="event-added-switch-pill">
											<input type="radio" name="event-added-status" value="ended">
											<span>종료</span>
										</label>
									</div>
								</div>

								<div class="event-added-meta-row">
									<div class="event-added-meta-left">
										<span class="event-added-meta-badge">무한 스크롤</span>
										<span class="event-added-meta-text" id="event-added-total-count">총 0건</span>
									</div>
									<div class="event-added-meta-right">
										<span class="event-added-meta-guide">스크롤 또는 하단 버튼으로 다음 이벤트 확인</span>
									</div>
								</div>
							</div>

							<div class="event-added-divider"></div>

							<div class="event-added-grid-wrap">
								<div class="row g-4" id="event-added-grid"></div>
							</div>

							<div class="event-added-load-more-wrap">
								<button type="button" id="event-added-load-more-btn" class="event-added-load-more-btn">
									다음 이벤트 더 보기
								</button>
							</div>

							<div id="event-added-scroll-sentinel" class="event-added-scroll-sentinel"
								aria-hidden="true"></div>
						</div>
					</section>
				</section>
			</div>
		</main>

		<footer th:replace="fragments/front/common :: commonFooter"></footer>
	</div>

	<style>
		.event-added-page-section {
			padding: 22px 0 110px 0 !important;
			background: linear-gradient(180deg, #ffffff 0%, #fbfbfb 100%) !important;
		}

		.event-added-top-wrap {
			padding: 34px 0 18px 0 !important;
		}

		.event-added-top-title-wrap {
			text-align: center !important;
			margin-bottom: 24px !important;
		}

		.event-added-top-title {
			margin: 0 0 8px 0 !important;
			font-size: 28px !important;
			font-weight: 700 !important;
			line-height: 1.3 !important;
			color: #111111 !important;
			letter-spacing: -0.03em !important;
		}

		.event-added-top-desc {
			margin: 0 !important;
			font-size: 15px !important;
			line-height: 1.7 !important;
			color: #666666 !important;
		}

		.event-added-switch-row {
			display: flex !important;
			justify-content: center !important;
			align-items: center !important;
			margin-bottom: 24px !important;
		}

		.event-added-switch-group {
			display: inline-flex !important;
			align-items: center !important;
			justify-content: center !important;
			gap: 12px !important;
			flex-wrap: wrap !important;
		}

		.event-added-switch-pill {
			margin: 0 !important;
			cursor: pointer !important;
		}

		.event-added-switch-pill input {
			display: none !important;
		}

		.event-added-switch-pill span {
			min-width: 98px !important;
			height: 48px !important;
			padding: 0 24px !important;
			display: inline-flex !important;
			align-items: center !important;
			justify-content: center !important;
			border-radius: 999px !important;
			border: 1px solid #dcdcdc !important;
			background: #ffffff !important;
			color: #222222 !important;
			font-size: 15px !important;
			font-weight: 700 !important;
			transition: all 0.28s ease !important;
			box-shadow: 0 8px 18px rgba(17, 17, 17, 0.04) !important;
		}

		.event-added-switch-pill input:checked+span {
			background: #111111 !important;
			color: #ffffff !important;
			border-color: #111111 !important;
			transform: translateY(-1px) !important;
			box-shadow: 0 14px 28px rgba(17, 17, 17, 0.16) !important;
		}

		.event-added-meta-row {
			display: flex !important;
			align-items: center !important;
			justify-content: space-between !important;
			gap: 18px !important;
			flex-wrap: wrap !important;
		}

		.event-added-meta-left,
		.event-added-meta-right {
			display: flex !important;
			align-items: center !important;
			gap: 10px !important;
			flex-wrap: wrap !important;
		}

		.event-added-meta-badge {
			display: inline-flex !important;
			align-items: center !important;
			justify-content: center !important;
			height: 34px !important;
			padding: 0 14px !important;
			border-radius: 999px !important;
			background: #f3f5f7 !important;
			color: #111111 !important;
			font-size: 13px !important;
			font-weight: 700 !important;
		}

		.event-added-meta-text,
		.event-added-meta-guide {
			font-size: 14px !important;
			color: #6d6d6d !important;
			line-height: 1.6 !important;
		}

		.event-added-divider {
			width: 100% !important;
			height: 2px !important;
			margin: 8px 0 34px 0 !important;
			background: linear-gradient(90deg, #111111 0%, #cfcfcf 100%) !important;
			border-radius: 999px !important;
		}

		.event-added-grid-wrap {
			position: relative !important;
		}

		.event-added-col {
			display: flex !important;
		}

		.event-added-card {
			position: relative !important;
			width: 100% !important;
			height: 100% !important;
			display: flex !important;
			flex-direction: column !important;
			border-radius: 28px !important;
			background: #ffffff !important;
			overflow: hidden !important;
			border: 1px solid rgba(17, 17, 17, 0.06) !important;
			box-shadow: 0 14px 34px rgba(17, 17, 17, 0.08) !important;
			transform: translateY(18px) !important;
			opacity: 0 !important;
			transition: transform 0.55s ease, opacity 0.55s ease, box-shadow 0.3s ease !important;
		}

		.event-added-card.event-added-visible {
			transform: translateY(0) !important;
			opacity: 1 !important;
		}

		.event-added-card:hover {
			transform: translateY(-6px) !important;
			box-shadow: 0 20px 42px rgba(17, 17, 17, 0.13) !important;
		}

		.event-added-thumb-wrap {
			position: relative !important;
			width: 100% !important;
			aspect-ratio: 470 / 550 !important;
			overflow: hidden !important;
			background: #f3f3f3 !important;
		}

		.event-added-thumb-wrap img {
			width: 100% !important;
			height: 100% !important;
			object-fit: cover !important;
			display: block !important;
			transition: transform 0.6s ease !important;
		}

		.event-added-card:hover .event-added-thumb-wrap img {
			transform: scale(1.05) !important;
		}

		.event-added-thumb-wrap::after {
			content: "" !important;
			position: absolute !important;
			inset: 0 !important;
			background: linear-gradient(180deg, rgba(17, 17, 17, 0.00) 0%, rgba(17, 17, 17, 0.10) 100%) !important;
			pointer-events: none !important;
		}

		.event-added-thumb-wrap.event-added-ended::after {
			background: linear-gradient(180deg, rgba(17, 17, 17, 0.12) 0%, rgba(17, 17, 17, 0.36) 100%), repeating-linear-gradient(-35deg, rgba(255, 255, 255, 0.10) 0px, rgba(255, 255, 255, 0.10) 12px, rgba(255, 255, 255, 0.00) 12px, rgba(255, 255, 255, 0.00) 28px) !important;
		}

		.event-added-number {
			position: absolute !important;
			top: 18px !important;
			left: 18px !important;
			z-index: 3 !important;
			min-width: 82px !important;
			height: 38px !important;
			padding: 0 14px !important;
			display: inline-flex !important;
			align-items: center !important;
			justify-content: center !important;
			border-radius: 999px !important;
			background: rgba(255, 255, 255, 0.92) !important;
			color: #111111 !important;
			font-size: 12px !important;
			font-weight: 800 !important;
			letter-spacing: 0.08em !important;
			box-shadow: 0 10px 22px rgba(17, 17, 17, 0.12) !important;
		}

		.event-added-state-badge {
			position: absolute !important;
			right: 18px !important;
			top: 18px !important;
			z-index: 3 !important;
			min-width: 76px !important;
			height: 38px !important;
			padding: 0 14px !important;
			display: inline-flex !important;
			align-items: center !important;
			justify-content: center !important;
			border-radius: 999px !important;
			font-size: 12px !important;
			font-weight: 800 !important;
			letter-spacing: 0.05em !important;
			box-shadow: 0 10px 22px rgba(17, 17, 17, 0.12) !important;
		}

		.event-added-state-badge.event-added-ongoing {
			background: rgba(255, 255, 255, 0.92) !important;
			color: #111111 !important;
		}

		.event-added-state-badge.event-added-ended {
			background: rgba(17, 17, 17, 0.72) !important;
			color: #ffffff !important;
		}

		.event-added-ended-label {
			position: absolute !important;
			left: 50% !important;
			top: 50% !important;
			transform: translate(-50%, -50%) rotate(-14deg) !important;
			z-index: 3 !important;
			min-width: 180px !important;
			height: 58px !important;
			padding: 0 24px !important;
			display: inline-flex !important;
			align-items: center !important;
			justify-content: center !important;
			border: 2px solid rgba(255, 255, 255, 0.88) !important;
			color: #ffffff !important;
			font-size: 22px !important;
			font-weight: 800 !important;
			letter-spacing: 0.12em !important;
			border-radius: 999px !important;
			background: rgba(17, 17, 17, 0.18) !important;
		}

		.event-added-card-body {
			display: flex !important;
			flex-direction: column !important;
			flex: 1 1 auto !important;
			padding: 24px 22px 24px 22px !important;
			text-align: left !important;
		}

		.event-added-title {
			margin: 0 0 12px 0 !important;
			font-size: 23px !important;
			line-height: 1.45 !important;
			font-weight: 700 !important;
			color: #111111 !important;
			letter-spacing: -0.03em !important;
		}

		.event-added-date {
			margin: 0 0 14px 0 !important;
			font-size: 14px !important;
			line-height: 1.65 !important;
			color: #555555 !important;
			font-weight: 700 !important;
		}

		.event-added-summary {
			margin: 0 !important;
			font-size: 15px !important;
			line-height: 1.75 !important;
			color: #6f6f6f !important;
			white-space: pre-line !important;
			word-break: keep-all !important;
		}

		.event-added-action {
			margin-top: auto !important;
			padding-top: 22px !important;
			min-height: 76px !important;
			display: flex !important;
			align-items: flex-end !important;
		}

		.event-added-action-btn,
		.event-added-action-empty {
			width: 100% !important;
			height: 54px !important;
			border-radius: 16px !important;
			display: inline-flex !important;
			align-items: center !important;
			justify-content: center !important;
			text-align: center !important;
			font-size: 15px !important;
			font-weight: 700 !important;
		}

		.event-added-action-btn {
			background: #111111 !important;
			color: #ffffff !important;
			text-decoration: none !important;
			transition: transform 0.25s ease, box-shadow 0.25s ease, opacity 0.25s ease !important;
			box-shadow: 0 14px 26px rgba(17, 17, 17, 0.16) !important;
		}

		.event-added-action-btn:hover {
			color: #ffffff !important;
			transform: translateY(-2px) !important;
			box-shadow: 0 18px 30px rgba(17, 17, 17, 0.22) !important;
		}

		.event-added-action-empty {
			background: #f4f6f8 !important;
			color: #a8a8a8 !important;
		}

		.event-added-load-more-wrap {
			margin-top: 38px !important;
		}

		.event-added-load-more-btn {
			width: 100% !important;
			min-height: 100px !important;
			border: none !important;
			border-radius: 26px !important;
			background: linear-gradient(135deg, #141414 0%, #2a2a2a 100%) !important;
			color: #ffffff !important;
			font-size: 20px !important;
			font-weight: 700 !important;
			display: flex !important;
			align-items: center !important;
			justify-content: center !important;
			box-shadow: 0 16px 34px rgba(17, 17, 17, 0.16) !important;
		}

		.event-added-load-more-btn:disabled {
			opacity: 0.45 !important;
			cursor: default !important;
		}

		.event-added-scroll-sentinel {
			width: 100% !important;
			height: 1px !important;
		}
	</style>

	<th:block th:replace="fragments/front/common :: commonScript"></th:block>
	<script src="/front/resources/js/event.js"></script>
</body>

</html>
