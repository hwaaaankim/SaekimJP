<html id="hamHtml" lang="ko" xmlns:th="http://www.thymeleaf.org">

	<div id="container">
		<th:block th:replace="~{fragments/front/common :: commonHeader(white=${false}, dark=${true})}"></th:block>

		<main id="main">
			<div class="main-wrap">
				<section class="bsc_container">
					<section class="subtit-wrap">
						<div class="inner w1280 mt-3">
							<p class="title">Before&amp;After</p>
							<span class="sub-txt">전후사진을 통해 새김성형외과의 신뢰를 확인하세요.</span><br>
						</div>

									</label>
									<label class="before-after-filter-pill">
										<input type="radio" name="before-after-category" value="eye">
										<span>눈</span>
									</label>
									<label class="before-after-filter-pill">
										<input type="radio" name="before-after-category" value="young">

									</label>
									<label class="before-after-filter-pill">

								<div class="row g-4" id="before-after-grid"></div>
							</div>

	</style>

	<script>
		document.addEventListener('DOMContentLoaded', function () {
			const beforeAfterImage = '/front/sample/700-500.png';
			const beforeAfterPageSize = 20;
			const beforeAfterAppendSize = 8;

			const beforeAfterCategoryMap = {
				all: '전체',
				eye: '눈',
				young: '동안',
				contour: '안면윤곽',
				nose: '코'
			};

			const beforeAfterTitlePool = {
				eye: ['자연유착 쌍꺼풀', '눈매교정', '앞트임', '뒤트임', '상안검', '하안검'],
				young: ['리프팅', '눈밑지방재배치', '이마거상', '실리프팅', '하안검', '미니거상'],
				contour: ['광대축소', '사각턱', '턱끝성형', '윤곽 3종', '미니 V라인', '비대칭교정'],
				nose: ['자연코성형', '복코교정', '매부리코', '코재수술', '콧대성형', '코끝성형']
			};

			const beforeAfterGrid = document.getElementById('before-after-grid');
			const beforeAfterCountEl = document.getElementById('before-after-total-count');
			const beforeAfterLoadMoreBtn = document.getElementById('before-after-load-more-btn');
			const beforeAfterSentinel = document.getElementById('before-after-scroll-sentinel');
			const beforeAfterFilterInputs = document.querySelectorAll('input[name="before-after-category"]');

			let beforeAfterCurrentFilter = 'all';
			let beforeAfterVisibleCount = beforeAfterPageSize;
			let beforeAfterRenderKey = 0;

			const beforeAfterItems = [];
			let beforeAfterId = 1;

			['eye', 'young', 'contour', 'nose'].forEach(function (categoryKey) {
				for (let i = 0; i < 9; i++) {
					const titleList = beforeAfterTitlePool[categoryKey];
					const title = titleList[i % titleList.length];
					beforeAfterItems.push({
						id: beforeAfterId,
						category: categoryKey,
						categoryLabel: beforeAfterCategoryMap[categoryKey],
						title: title,
						subText: 'Before & After Case ' + String(beforeAfterId).padStart(2, '0'),
						beforeImage: beforeAfterImage,
						afterImage: beforeAfterImage,
						defaultState: (beforeAfterId % 2 === 0) ? 'after' : 'before'
					});
					beforeAfterId++;
				}
			});

			function beforeAfterGetFilteredItems() {
				if (beforeAfterCurrentFilter === 'all') {
					return beforeAfterItems;
				}
				return beforeAfterItems.filter(function (item) {
					return item.category === beforeAfterCurrentFilter;
				});
			}

			function beforeAfterCreateCard(item) {
				const col = document.createElement('div');
				col.className = 'col-12 col-sm-6 col-lg-3 before-after-col';

				const isAfter = item.defaultState === 'after';

				col.innerHTML = `
					<article class="before-after-card before-after-observe">
						<div class="before-after-card-media">
							<div class="before-after-card-toggle-wrap">
								<button type="button" class="before-after-card-toggle ${isAfter ? 'is-after' : 'is-before'}" aria-label="전후사진 전환">
									<span class="before-after-card-toggle-indicator"></span>
									<span class="before-after-card-toggle-text before-after-before-label">Before</span>
									<span class="before-after-card-toggle-text before-after-after-label">After</span>
								</button>
							</div>

							<div class="before-after-card-viewport">
								<div class="before-after-card-track ${isAfter ? 'is-after' : ''}">
									<div class="before-after-card-panel before-after-card-panel-before">
										<img src="${item.beforeImage}" alt="${item.title} Before">
										<span class="before-after-card-label">BEFORE</span>
									</div>
									<div class="before-after-card-panel before-after-card-panel-after">
										<img src="${item.afterImage}" alt="${item.title} After">
										<span class="before-after-card-label">AFTER</span>
									</div>
								</div>
							</div>
						</div>

						<div class="before-after-card-body">
							<span class="before-after-card-category">${item.categoryLabel}</span>
							<h3 class="before-after-card-title">${item.title}</h3>
							<p class="before-after-card-sub">${item.subText}</p>
						</div>
					</article>
				`;

				const toggleBtn = col.querySelector('.before-after-card-toggle');
				const track = col.querySelector('.before-after-card-track');

				toggleBtn.addEventListener('click', function () {
					const isNowAfter = track.classList.toggle('is-after');
					toggleBtn.classList.toggle('is-after', isNowAfter);
					toggleBtn.classList.toggle('is-before', !isNowAfter);
				});

				return col;
			}

			function beforeAfterBindReveal() {
				const targetCards = document.querySelectorAll('.before-after-observe');

				const observer = new IntersectionObserver(function (entries) {
					entries.forEach(function (entry) {
						if (entry.isIntersecting) {
							entry.target.classList.add('before-after-visible');
							observer.unobserve(entry.target);
						}
					});
				}, {
					threshold: 0.12
				});

				targetCards.forEach(function (card) {
					observer.observe(card);
				});
			}

			function beforeAfterUpdateButton(filteredItems) {
				const remain = filteredItems.length - beforeAfterVisibleCount;
				if (remain > 0) {
					beforeAfterLoadMoreBtn.disabled = false;
					beforeAfterLoadMoreBtn.textContent = '다음 전후사진 더 보기 (' + remain + '건 남음)';
				} else {
					beforeAfterLoadMoreBtn.disabled = true;
					beforeAfterLoadMoreBtn.textContent = '모든 전후사진을 확인하셨습니다';
				}
			}

			function beforeAfterRender(reset) {
				const filteredItems = beforeAfterGetFilteredItems();
				if (reset) {
					beforeAfterVisibleCount = beforeAfterPageSize;
					beforeAfterGrid.innerHTML = '';
				}

				const visibleItems = filteredItems.slice(0, beforeAfterVisibleCount);
				beforeAfterGrid.innerHTML = '';
				visibleItems.forEach(function (item) {
					beforeAfterGrid.appendChild(beforeAfterCreateCard(item));
				});

				beforeAfterCountEl.textContent = '총 ' + filteredItems.length + '건';
				beforeAfterUpdateButton(filteredItems);
				beforeAfterBindReveal();
				beforeAfterRenderKey++;

			function beforeAfterLoadMore() {

			}

			beforeAfterFilterInputs.forEach(function (input) {
				input.addEventListener('change', function () {

			beforeAfterLoadMoreBtn.addEventListener('click', beforeAfterLoadMore);

			let beforeAfterScrollTicking = false;

					}
					beforeAfterScrollTicking = false;
				});
			});

			beforeAfterRender(true);
		});
	</script>
