<html id="hamHtml" lang="ko" xmlns:th="http://www.thymeleaf.org">

<head th:replace="fragments/front/common :: commonHead"></head>

<body id="hamBody" class="" data-aos-easing="ease" data-aos-duration="400" data-aos-delay="0">
<div id="container">
    <th:block th:replace="~{fragments/front/common :: commonHeader(white=${false}, dark=${true})}"></th:block>

    <main id="main">
        <div class="main-wrap">
            <section class="bsc_container">
                <section class="subtit-wrap">
                    <div class="inner w1280 mt-3">
                        <p class="title">FAQ</p>
                        <span class="sub-txt">이용시 자주 묻는 질문을 확인해보세요.</span><br>
                    </div>
                </section>

                <section class="default-wrap">
                    <div class="inner w1280">
                        <div class="total-searchBox">
                            <div class="total">
                                <p class="total-txt">
                                    Total <span class="total-num" th:text="${totalCount}">0</span>
                                </p>
                            </div>

                            <form name="searchForm" id="searchForm" method="get" th:action="@{/faq}">
                                <div class="search">
                                    <div class="inputBox">
                                        <input type="text"
                                               name="keyword"
                                               title="검색어"
                                               class="input-txt"
                                               placeholder="검색어를 입력하세요."
                                               th:value="${keyword}">
                                        <button type="submit" value="검색" class="searchBtn"></button>
                                    </div>
                                </div>
                            </form>
                        </div>

                        <div class="faq-list__wrap" th:if="${!faqPage.empty}">
                            <ul class="faq-list">
                                <li class="faq-list__item" th:each="faq : ${faqList}">
                                    <a class="faq-question js-front-faq-question"
                                       th:id="${'Q' + faq.id}"
                                       role="button"
                                       aria-expanded="false"
                                       th:attr="aria-controls=${'A' + faq.id}, data-faq-id=${faq.id}, data-viewed='false'"
                                       href="javascript:void(0);">

                                        <span class="faq-question__icon">Q<em class="blind">질문</em></span>

                                        <strong class="faq-question__text">
                                            <span class="tag-category md">FAQ</span>
                                            <span th:text="${faq.title}">FAQ 제목</span>

                                            <span style="display:block; margin-top:8px; font-size:14px; font-weight:400; color:#888;">
                                                등록일
                                                <span th:text="${#temporals.format(faq.createdAt, 'yyyy.MM.dd')}">2026.04.15</span>
                                                &nbsp;&nbsp;&nbsp;
                                                조회수
                                                <span class="js-front-faq-view-count" th:text="${faq.viewCount}">0</span>
                                            </span>
                                        </strong>

                                        <span class="faq-open-close"><s></s></span>
                                    </a>

                                    <div class="faq-answer"
                                         th:id="${'A' + faq.id}"
                                         style="display: none;">
                                        <div class="faq-answer__wrap">
                                            <span class="faq-answer__icon">A<em class="blind">답변</em></span>

                                            <div class="faq-answer__box">
                                                <div style="white-space: pre-line;" th:text="${faq.answer}">
                                                    FAQ 답변
                                                </div>

                                                <div th:if="${faq.linkEnabled and faq.linkUrl != null and !#strings.isEmpty(faq.linkUrl)}"
                                                     style="margin-top: 16px;">
                                                    <a th:href="${faq.linkUrl}"
                                                       target="_blank"
                                                       rel="noopener noreferrer">
                                                        * 관련 링크 바로가기
                                                    </a>
                                                </div>

                                                <div style="margin-top: 16px; font-size:14px; color:#888;">
                                                    최종 수정일
                                                    <span th:text="${#temporals.format(faq.updatedAt, 'yyyy.MM.dd')}">2026.04.15</span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </li>
                            </ul>
                        </div>

                        <div th:if="${faqPage.empty}" style="padding:80px 0; text-align:center; color:#888;">
                            검색 결과가 없습니다.
                        </div>

                        <ul class="list-pagination" th:if="${faqPage.totalElements > 0}">
                            <span class="arrow">
                                <a th:href="@{/faq(page=1, keyword=${keyword})}" class="first">
                                    <em class="blind">처음페이지</em>
                                </a>
                                <a th:href="@{/faq(page=${currentPage > 1 ? currentPage - 1 : 1}, keyword=${keyword})}" class="prev">
                                    <em class="blind">이전페이지</em>
                                </a>
                            </span>

                            <ul class="num-list">
                                <li th:each="pageNum : ${#numbers.sequence(startPage, endPage)}"
                                    th:classappend="${pageNum == currentPage} ? 'current on' : ''">
                                    <a th:href="@{/faq(page=${pageNum}, keyword=${keyword})}"
                                       th:text="${pageNum}">1</a>
                                </li>
                            </ul>

                            <span class="arrow">
                                <a th:href="@{/faq(page=${currentPage < faqPage.totalPages ? currentPage + 1 : faqPage.totalPages}, keyword=${keyword})}" class="next">
                                    <em class="blind">다음페이지</em>
                                </a>
                                <a th:href="@{/faq(page=${faqPage.totalPages}, keyword=${keyword})}" class="last">
                                    <em class="blind">마지막페이지</em>
                                </a>
                            </span>
                        </ul>
                    </div>
                </section>
            </section>
        </div>
    </main>

    <footer th:replace="fragments/front/common :: commonFooter"></footer>
</div>

<th:block th:replace="fragments/front/common :: commonScript"></th:block>
<script src="/front/resources/js/faq.js"></script>
</body>
</html>
